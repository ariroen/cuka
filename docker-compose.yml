version: '3.8'

services:
  bot:
    build: .
    container_name: contract61_bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    networks:
      - contract61_network

  # Optional: FastAPI admin panel (future)
